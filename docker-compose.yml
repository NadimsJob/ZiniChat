version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: zinichat_redis_${ENV_NAME:-test}
    restart: always
    networks:
      - zinichat_network
    volumes:
      - zinichat_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zinichat_backend_${ENV_NAME:-test}
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8100}:3000"
    networks:
      - zinichat_network
      - supabase_network
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.zinichat-backend.rule=Host(`api.zinichat.com`)"
      - "traefik.http.routers.zinichat-backend.entrypoints=websecure"
      - "traefik.http.routers.zinichat-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.zinichat-backend.loadbalancer.server.port=3000"
      # WebSocket support for Socket.io
      - "traefik.http.middlewares.zinichat-backend-ws.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.zinichat-backend.middlewares=zinichat-backend-ws"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://76.13.187.85:8100}
    container_name: zinichat_frontend_${ENV_NAME:-test}
    restart: always
    env_file:
      - ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-8101}:3000"
    networks:
      - zinichat_network
    depends_on:
      - backend
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.zinichat-frontend.rule=Host(`zinichat.com`) || Host(`www.zinichat.com`)"
      - "traefik.http.routers.zinichat-frontend.entrypoints=websecure"
      - "traefik.http.routers.zinichat-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.zinichat-frontend.loadbalancer.server.port=3000"

networks:
  zinichat_network:
    driver: bridge
  supabase_network:
    external: true
    name: ${SUPABASE_NETWORK_NAME:-supabase-test_default}

volumes:
  zinichat_redis_data:
