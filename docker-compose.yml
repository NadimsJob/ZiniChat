services:
  redis:
    image: redis:alpine
    container_name: zinichat_redis_${ENV_NAME:-test}
    restart: always
    networks:
      - zinichat_network
    volumes:
      - zinichat_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zinichat_backend_${ENV_NAME:-test}
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8100}:3000"
    networks:
      - zinichat_network
      - supabase_network
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.docker.network=${ZINICHAT_NETWORK_NAME:-zinichat-test_zinichat_network}"
      - "traefik.http.routers.zinichat-backend-${ENV_NAME:-test}.rule=Host(`${API_DOMAIN:-api-test.zinichat.com}`)"
      - "traefik.http.routers.zinichat-backend-${ENV_NAME:-test}.entrypoints=websecure"
      - "traefik.http.routers.zinichat-backend-${ENV_NAME:-test}.tls.certresolver=letsencrypt"
      - "traefik.http.services.zinichat-backend-${ENV_NAME:-test}.loadbalancer.server.port=3000"
      # WebSocket support for Socket.io
      - "traefik.http.middlewares.zinichat-backend-ws-${ENV_NAME:-test}.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.zinichat-backend-${ENV_NAME:-test}.middlewares=zinichat-backend-ws-${ENV_NAME:-test}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://76.13.187.85:8100}
    container_name: zinichat_frontend_${ENV_NAME:-test}
    restart: always
    env_file:
      - ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-8101}:3000"
    networks:
      - zinichat_network
    depends_on:
      - backend
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.zinichat-frontend-${ENV_NAME:-test}.rule=Host(`${FRONTEND_DOMAIN:-test.zinichat.com}`)"
      - "traefik.http.routers.zinichat-frontend-${ENV_NAME:-test}.entrypoints=websecure"
      - "traefik.http.routers.zinichat-frontend-${ENV_NAME:-test}.tls.certresolver=letsencrypt"
      - "traefik.http.services.zinichat-frontend-${ENV_NAME:-test}.loadbalancer.server.port=3000"

networks:
  zinichat_network:
    driver: bridge
  supabase_network:
    external: true
    name: ${SUPABASE_NETWORK_NAME:-supabase-test_default}

volumes:
  zinichat_redis_data:
