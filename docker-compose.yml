version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: zinichat_redis
    restart: always
    networks:
      - zinichat_network
    volumes:
      - zinichat_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zinichat_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8100:3000"
    networks:
      - zinichat_network
      - supabase_test_network
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zinichat_frontend
    restart: always
    env_file:
      - ./frontend/.env.local
    ports:
      - "8101:3000"
    networks:
      - zinichat_network
    depends_on:
      - backend

networks:
  zinichat_network:
    driver: bridge
  supabase_test_network:
    external: true
    name: supabase-test_default

volumes:
  zinichat_redis_data:

